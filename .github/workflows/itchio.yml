name: Publish to itch.io

on:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to publish (e.g. v1.0.0)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ITCH_PROJECT: treytomes/mazer

jobs:
  publish:
    name: Publish (${{ matrix.channel }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - channel: linux
            asset: mazer-linux.tar.gz
          - channel: windows
            asset: mazer-windows.zip
          - channel: osx
            asset: mazer-macos.tar.gz

    steps:
      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Download release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ steps.tag.outputs.value }}" \
            --repo treytomes/mazer \
            --pattern "${{ matrix.asset }}"

      - name: Install Butler
        run: |
          curl -L -o butler.zip https://github.com/itchio/butler/releases/latest/download/butler-linux-amd64.zip
          unzip butler.zip
          chmod +x butler
          ./butler -V

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          ./butler push "${{ matrix.asset }}" \
            "${{ env.ITCH_PROJECT }}:${{ matrix.channel }}" \
            --userversion "${{ steps.tag.outputs.value }}"
