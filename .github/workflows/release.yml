name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: mazer-linux
            archive_ext: tar.gz
          - os: windows-latest
            artifact_name: mazer-windows
            archive_ext: zip
          - os: macos-latest
            artifact_name: mazer-macos
            archive_ext: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev

      - name: Install SDL2 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2

      - name: Install SDL2 (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install sdl2:x64-windows

      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./build/tests/mazer_tests --reporter compact

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: ./build/tests/Release/mazer_tests.exe --reporter compact

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          cp build/mazer dist/
          tar -czf ${{ matrix.artifact_name }}.tar.gz -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist
          Copy-Item build\Release\mazer.exe dist\
          Copy-Item "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin\SDL2.dll" dist\
          Compress-Archive -Path dist\* -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            mazer-linux.tar.gz \
            mazer-windows.zip \
            mazer-macos.tar.gz
