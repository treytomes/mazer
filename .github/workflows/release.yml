name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: mazer-linux
            archive_ext: tar.gz
          - os: windows-latest
            artifact_name: mazer-windows
            archive_ext: zip
          - os: macos-latest
            artifact_name: mazer-macos
            archive_ext: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev

      - name: Install SDL2 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2

      - name: Install SDL2 (Windows)
        if: runner.os == 'Windows'
        run: choco install sdl2 --yes

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./build/tests/mazer_tests --reporter compact

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: ./build/tests/Release/mazer_tests.exe --reporter compact

      # ---- Package Linux ----
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir dist
          cp build/mazer dist/
          tar -czf ${{ matrix.artifact_name }}.tar.gz -C dist .

      # ---- Package macOS ----
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir dist
          cp build/mazer dist/
          tar -czf ${{ matrix.artifact_name }}.tar.gz -C dist .

      # ---- Package Windows ----
      - name: Locate SDL2.dll (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dll = Get-ChildItem "C:\ProgramData\chocolatey" -Recurse -Filter "SDL2.dll" |
                 Where-Object { $_.FullName -match "x64" } |
                 Select-Object -First 1
          echo "SDL2_DLL=$($dll.FullName)" >> $env:GITHUB_ENV

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist
          Copy-Item build\Release\mazer.exe dist\
          Copy-Item "$env:SDL2_DLL" dist\
          Compress-Archive -Path dist\* -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mazer-linux.tar.gz
            mazer-windows.zip
            mazer-macos.tar.gz
          generate_release_notes: true
